# Schedule Tasks - 定期実行タスク定義
# Botがこのファイルを読み込んでスケジュール実行する

tasks:
  # タスク確認（毎時）
  - name: "タスク確認"
    schedule: "hourly"  # cron形式も可: "0 * * * *"
    channel: "1475880463800205315"  # #機能開発室
    mention: "1475431819565469706"  # エージェント
    prompt: "🎋 TASK確認"
    thread: true  # スレッドを作成
    thread_name: "🔧 {date} タスク確認"  # {date}, {time}, {name} 使用可能
    enabled: true

  # 朝のアイデア提案（毎日 09:00）
  - name: "朝のアイデア提案"
    schedule: "0 9 * * *"  # 毎日 09:00 JST
    channel: "1475861389984796702"  # #新規企画開発
    mention: "1475431819565469706"  # エージェント
    prompt: "💡 今日のアイデア提案をお願いします"
    thread: true
    thread_name: "🎋 {date} アイデア提案"
    enabled: true

  # 夜の振り返り（毎日 21:00）
  - name: "夜の振り返り"
    schedule: "0 21 * * *"  # 毎日 21:00 JST
    channel: "1475880463800205315"  # #機能開発室
    mention: "1153319182486741085"  # Maki
    prompt: "📊 本日の進捗をまとめてください"
    enabled: true  # スレッドなし

  # 自動コンテンツ生成パイプライン（毎日 09:00）
  - name: "自動コンテンツ生成パイプライン"
    schedule: "0 9 * * *"  # 毎日 09:00 JST
    channel: "1475880463800205315"  # #機能開発室
    mention: "1475431819565469706"  # エージェント
    prompt: "🎨 自動コンテンツ生成パイプラインを実行してください。HF Papersからトップ論文を取得し、nano-banana-2で図解画像を生成して、XとDiscordに投稿してください。"
    thread: true
    thread_name: "🎨 {date} 自動コンテンツ生成"
    enabled: true

  # 週間AGIレポート（毎週月曜日 09:00）
  - name: "週間AGIレポート"
    schedule: "0 9 * * 1"  # 毎週月曜日 09:00 JST
    channel: "1475880463800205315"  # #機能開発室
    mention: "1153319182486741085"  # Maki
    prompt: "📊 週間AGIレポートを生成してください。過去1週間のGitHub Projectの統計、完了タスク、新規アイデアをまとめて報告してください。"
    thread: true
    thread_name: "📊 週間AGIレポート ({date})"
    task_file: "weekly-report.yaml"  # タスク定義ファイル
    enabled: true

  # 自動日報生成（毎日 23:00）
  - name: "自動日報生成"
    schedule: "0 23 * * *"  # 毎日 23:00 JST
    channel: "1475880463800205315"  # #機能開発室
    mention: "1475431819565469706"  # エージェント
    prompt: |
      📝 **自動日報生成**

      今日の日報を生成してください。以下の手順で実施：

      1. **GitHub Projectから完了タスクを取得**
         - `gh project item-list 1 --owner onizuka-agi-co --format json` を使用
         - 今日完了したタスクを抽出（status == "Done"）

      2. **日報を生成**
         - daily-memoryスキルを使用
         - `uv run skills/daily-memory/scripts/daily_memory.py add` を実行
         - 完了タスクを --completed に追加
         - タグに #自動生成 を追加

      3. **ビルド検証**
         - `cd ~/.openclaw/workspace/memory && npm run docs:build` を実行
         - エラーがあれば修正

      4. **コミット＆プッシュ**
         - `uv run skills/daily-memory/scripts/daily_memory.py commit` を実行

      5. **結果を報告**
         - 生成した日報の内容を要約して報告
    thread: true
    thread_name: "📝 {date} 自動日報生成"
    enabled: true

# エラー通知設定
error_notification:
  channel: "1475880463800205315"  # #機能開発室
  mention: "1153319182486741085"  # Maki
  enabled: true

# 設定
settings:
  timezone: "Asia/Tokyo"
  check_interval: 60  # 秒単位でチェック間隔
