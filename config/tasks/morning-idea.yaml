prompt: |
  💡 **今日のアイデア提案 - マルチエージェント議論**

  **ユーザーの反応は待たず、タスクを完遂すること。**

  ## 🎯 ONIZUKA ミッション
  > 「AGIの知見をほどき、世界に届ける」

  ## 📋 手順（自動完結）

  ### Step 1: 3人のsub-agentを並列spawn
  sessions_spawn を使用して、以下の3つのエージェントを並列実行：

  Agent A（企画担当）:
  - 企画担当として、ONIZUKAの活動領域に基づいてアイデアを3つ提案せよ。
  - 活動領域：@hAru_mAki_ch の投稿深掘り / AGI論文の要約 / 知見を整理して公開
  - 短期・中期・長期をバランスよく提案すること。
  - runtime: subagent / mode: run

  Agent B（技術検証）:
  - 技術検証担当として、アイデアの実現可能性を評価せよ。
  - 評価観点：必要なツール・スキル / 見積もり時間 / 技術的ハードル
  - runtime: subagent / mode: run

  Agent C（批判的検討）:
  - 批判的検討担当として、アイデアの課題・リスクを指摘し、優先順位付けを行え。
  - runtime: subagent / mode: run

  ### Step 2: 議論結果を統合
  3つのエージェントの結果を統合し、以下を出力：
  - 最も実現可能なアイデア1つを選定
  - 具体的な実行ステップ（最初の1歩まで）
  - 見積もりと完了条件

  ### Step 3: 自動実行（ユーザー確認不要）
  選定したアイデアに対して、以下を自動的に実行：

  1. GitHub Project にタスク登録（github-project スキル）
     - Status: Backlog
     - Priority: P1（短期）/ P2（中期）/ P3（長期）
     - Size: 見積もりに応じて XS〜XL

  2. memory/docs/YYYY/MM/DD/ に議論結果を保存

  3. TASK.md に実行タスクを追加（必要な場合）

  ## 📝 出力形式
  スレッドに以下を投稿：

  ## 🎋 アイデア議論結果

  ### 選定アイデア
  [アイデア名]
  - 概要：...
  - 期間：短期/中期/長期
  - 優先度：P1/P2/P3

  ### 実行計画
  1. [最初のステップ]
  2. [次のステップ]

  ### 自動実行済み
  - GitHub Project に登録済み
  - memory/docs/ に保存済み

  **Project URL:** https://github.com/orgs/onizuka-agi-co/projects/1
