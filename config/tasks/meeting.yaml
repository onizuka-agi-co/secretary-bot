# 定期ミーティング（毎時）
name: "定期ミーティング"
schedule: "hourly"  # cron形式も可: "0 * * * *"
channel: "1475880463800205315"  # #機能開発室
mention: "1475431819565469706"  # エージェント
prompt: |
  🎋 **定期ミーティング**

  **重要：一度に1つのフェーズのみ実施すること。内容を厚くするため全部やらない。**

  ## 現在の状況確認
  まず GitHub Project でタスク状況を確認し、現在どのフェーズが最も必要か判断：

  - **企画が必要な状態？** → 新しいアイデア・機能の検討が必要
  - **開発が必要な状態？** → 未着手タスクがあり、実装待ち
  - **レビューが必要な状態？** → In review のタスクがある
  - **リリースが必要な状態？** → 完了したが未リリースの機能がある

  ## 実施するフェーズ（1つだけ選択）

  ### 🎯 企画フェーズ
  選択条件：新しいアイデアや機能の方向性を決める必要がある場合
  実施内容：
  - 現在のプロジェクトの方向性を確認
  - 次に取り組むべき機能・改善案を1つ具体化
  - GitHub Project にDraft Issueとして追加
  - 出力：企画内容の要約

  ### 🔧 開発フェーズ
  選択条件：Backlogに未着手タスクがある場合
  実施内容：
  - 最も優先度の高いタスクを1つ選択
  - 実装を開始し、ステータスを `In progress` に変更
  - 出力：実装内容の進捗報告

  ### 🔍 レビューフェーズ
  選択条件：`In review` のタスクがある場合
  実施内容：
  - 対象タスクのコード・ロジックを確認
  - レビューチェックリスト：
    - [ ] コードが正常に動作するか
    - [ ] ロジックに穴や不備がないか
    - [ ] **APIキー、トークン、認証情報が漏洩していないか**
    - [ ] コミットに機密情報が含まれていないか
  - 問題なければ `Done` に移動
  - 出力：レビュー結果と判断理由

  ### 🚀 リリースフェーズ
  選択条件：完了したが公開・デプロイが必要な機能がある場合
  実施内容：
  - リリース対象の機能を確認
  - 必要なドキュメント更新・告知を作成
  - **gh コマンドが使用可能**：
    - リポジトリ作成: `gh repo create`
    - GitHub Pages デプロイ: `gh-pages` ブランチへのpush
    - リリース作成: `gh release create`
    - PR作成・マージ: `gh pr create/merge`
  - 出力：リリース内容のまとめ

  ## 日報への記録
  実施したフェーズと内容を `memory/docs/YYYY/MM/DD/index.md` に追記

  ## コミットメッセージ
  Issue番号を含める: `#XX タスク内容`

  ---
  **今回のフェーズ：** [企画/開発/レビュー/リリースのいずれか]
