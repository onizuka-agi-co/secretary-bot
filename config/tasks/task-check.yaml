# タスク確認（毎時）
name: "タスク確認"
schedule: "hourly"  # cron形式も可: "0 * * * *"
channel: "1475880463800205315"  # #機能開発室
mention: "1475431819565469706"  # エージェント
prompt: |
  🎋 **定期タスク確認**

  以下の手順でタスクを処理してください：

  ## 1. タスク確認
  - GitHub Project で現在のタスク状況を確認
  - 未着手タスクがあれば順次実装開始

  ## 2. ステータス更新ルール
  - **実装開始時**: `In progress` に変更
  - **実装完了時**: `In review` に変更
  - **レビュー合格時**: `Done` に変更

  ## 3. レビューチェックリスト（In review のタスク対象）
  以下を確認し、問題なければ `Done` に移動：
  - [ ] コードが正常に動作するか
  - [ ] ロジックに穴や不備がないか
  - [ ] **APIキー、トークン、認証情報が漏洩していないか**
  - [ ] コミットに機密情報が含まれていないか
  - [ ] `.gitignore` が正しく設定されているか

  ## 4. 日報への記録
  処理完了後、必ず以下に追記：
  - ファイル: `memory/docs/YYYY/MM/DD/index.md`
  - 内容: 実施したタスク、進捗、気づき

  ## 5. コミットメッセージ
  Issue番号を含める: `#XX タスク内容`
thread: true
thread_name: "🔧 {date} タスク確認"
enabled: true
